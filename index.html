<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Boxing Game</title>
<style>
body { margin:0; font-family:Arial; background:#000; color:white; text-align:center; }
.screen { display:none; }
.active { display:block; }
button { padding:10px; margin:5px; font-size:16px; }
.ring { width:90%; max-width:900px; height:400px; margin:auto; border:5px solid white; position:relative; background:#222; overflow:hidden; }
.fighter { width:100px; position:absolute; bottom:40px; transition:0.2s; }
#p1 { left:50px; }
#p2 { right:50px; }
.healthbar { width:80%; margin:5px auto; background:red; height:20px; }
.health { height:100%; background:lime; width:100%; }
.ref { position:absolute; left:50%; transform:translateX(-50%); bottom:60px; }
</style>
</head>
<body><h1>🥊 Pro Boxing Game</h1><!-- MENU --><div id="menu" class="screen active">
    <h2>Main Menu</h2>
    <button onclick="goSelect()">Start Game</button>
</div><!-- CHARACTER SELECT --><div id="select" class="screen">
    <h2>Select Fighter</h2>
    <button onclick="choose(1)">Naija Champ 🇳🇬</button>
    <button onclick="choose(2)">UK Warrior 🇬🇧</button>
</div><!-- GAME --><div id="game" class="screen">
    <div>Player Health</div>
    <div class="healthbar"><div id="h1" class="health"></div></div><div>Enemy Health</div>
<div class="healthbar"><div id="h2" class="health"></div></div>

<div class="ring">
    <img id="p1" class="fighter" src="https://i.imgur.com/7QZ7Z6F.png">
    <img id="p2" class="fighter" src="https://i.imgur.com/7QZ7Z6F.png">
    <div class="ref">👨‍⚖️</div>
</div>

<button onclick="attack('light')">Punch</button>
<button onclick="attack('heavy')">Heavy</button>
<button onclick="block()">Block</button>

</div><script>
let player = 1;
let h1=100, h2=100;
let blocking=false;

function show(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function goSelect(){ show('select'); }

function choose(p){ player=p; show('game'); }

function update(){
    h1=Math.max(0,h1); h2=Math.max(0,h2);
    document.getElementById('h1').style.width=h1+'%';
    document.getElementById('h2').style.width=h2+'%';
}

function attack(type){
    let dmg = type==='heavy'?20:10;
    if(Math.random()<0.3) dmg*=2; // critical

    if(!blocking){ h2-=dmg; }
    enemyAI();
    update();
    check();
}

function block(){
    blocking=true;
    setTimeout(()=>blocking=false,1000);
}

function enemyAI(){
    let move=Math.random();
    if(move<0.5){
        let dmg=10;
        if(!blocking) h1-=dmg;
    }
}

function check(){
    if(h1<=0){ alert('You Lost'); show('menu'); reset(); }
    if(h2<=0){ alert('You Win'); show('menu'); reset(); }
}

function reset(){ h1=100; h2=100; update(); }

window.addEventListener('keydown',e=>{
    if(e.key==='a') attack('light');
    if(e.key==='s') attack('heavy');
    if(e.key==='d') block();
});

update();
</script></body>
</html>
