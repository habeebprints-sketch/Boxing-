<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Boxing Game Complete</title>
<style>
body { margin:0; font-family:Arial; background:#000; color:white; text-align:center; }
.screen { display:none; }
.active { display:block; }
button { padding:10px; margin:5px; font-size:16px; }
.ring { width:90%; max-width:900px; height:420px; margin:auto; border:5px solid white; position:relative; background:#222; overflow:hidden; }
.fighter { width:100px; position:absolute; bottom:40px; transition:0.2s; }
#p1 { left:50px; }
#p2 { right:50px; }
.healthbar { width:80%; margin:5px auto; background:red; height:20px; }
.health { height:100%; background:lime; width:100%; }
.ref { position:absolute; left:50%; transform:translateX(-50%); bottom:60px; }
.timer { font-size:20px; }
</style>
</head>
<body><h1>🥊 Ultimate Boxing Game</h1><!-- MENU --><div id="menu" class="screen active">
    <h2>Main Menu</h2>
    <button onclick="goSelect()">Start Game</button>
</div><!-- SELECT --><div id="select" class="screen">
    <h2>Select Fighter</h2>
    <button onclick="choose('Naija Champ 🇳🇬')">Naija Champ 🇳🇬</button>
    <button onclick="choose('UK Warrior 🇬🇧')">UK Warrior 🇬🇧</button>
</div><!-- GAME --><div id="game" class="screen">
    <div id="playerName"></div>
    <div class="healthbar"><div id="h1" class="health"></div></div><div>Enemy</div>
<div class="healthbar"><div id="h2" class="health"></div></div>

<div class="timer">Round: <span id="round">1</span> | Time: <span id="time">30</span></div>

<div class="ring">
    <img id="p1" class="fighter" src="https://i.imgur.com/7QZ7Z6F.png">
    <img id="p2" class="fighter" src="https://i.imgur.com/7QZ7Z6F.png">
    <div class="ref">👨‍⚖️</div>
</div>

<button onclick="move(-20)">⬅️</button>
<button onclick="move(20)">➡️</button>
<button onclick="attack('light')">Punch</button>
<button onclick="attack('heavy')">Heavy</button>
<button onclick="block()">Block</button>

</div><script>
let h1=100,h2=100;
let stamina=100;
let blocking=false;
let round=1;
let time=30;
let timer;

function show(id){
 document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

function goSelect(){ show('select'); }

function choose(name){
 document.getElementById('playerName').innerText=name;
 show('game');
 startRound();
}

function update(){
 document.getElementById('h1').style.width=h1+'%';
 document.getElementById('h2').style.width=h2+'%';
 document.getElementById('round').innerText=round;
 document.getElementById('time').innerText=time;
}

function move(x){
 let p=document.getElementById('p1');
 let current=parseInt(p.style.left||50);
 p.style.left=(current+x)+'px';
}

function attack(type){
 if(stamina<=0) return;
 let dmg= type==='heavy'?20:10;
 stamina-= type==='heavy'?20:10;
 if(Math.random()<0.3) dmg*=2;
 if(!blocking) h2-=dmg;
 enemyAI();
 update();
 check();
}

function block(){
 blocking=true;
 setTimeout(()=>blocking=false,1000);
}

function enemyAI(){
 let move=Math.random();
 if(move<0.6){
  let dmg=10;
  if(!blocking) h1-=dmg;
 }
}

function check(){
 if(h1<=0){ alert('You Lost'); resetGame(); }
 if(h2<=0){ alert('You Win'); resetGame(); }
}

function startRound(){
 time=30;
 clearInterval(timer);
 timer=setInterval(()=>{
  time--;
  if(time<=0){
    round++;
    if(round>3){ endMatch(); }
    else startRound();
  }
  update();
 },1000);
}

function endMatch(){
 clearInterval(timer);
 if(h1>h2) alert('You Win Match'); else alert('You Lose Match');
 resetGame();
}

function resetGame(){
 h1=100; h2=100; stamina=100; round=1;
 show('menu');
 update();
}

window.addEventListener('keydown',e=>{
 if(e.key==='a') move(-20);
 if(e.key==='d') move(20);
 if(e.key==='j') attack('light');
 if(e.key==='k') attack('heavy');
 if(e.key==='l') block();
});

update();
</script></body>
</html>
