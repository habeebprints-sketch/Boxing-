<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Online Tic Tac Toe</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#020b2d;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      padding:20px;
    }

    h1{
      font-size:55px;
      margin-bottom:20px;
      text-align:center;
    }

    .controls{
      display:flex;
      flex-direction:column;
      gap:15px;
      width:100%;
      max-width:400px;
      margin-bottom:30px;
    }

    input{
      padding:18px;
      border:none;
      border-radius:15px;
      font-size:18px;
      outline:none;
    }

    .btns{
      display:flex;
      gap:15px;
    }

    button{
      flex:1;
      padding:16px;
      border:none;
      border-radius:15px;
      background:#2563eb;
      color:white;
      font-size:20px;
      cursor:pointer;
      transition:0.3s;
      font-weight:bold;
    }

    button:hover{
      transform:scale(1.05);
      background:#1d4ed8;
    }

    #status{
      margin:20px 0;
      font-size:28px;
      text-align:center;
    }

    .board{
      display:grid;
      grid-template-columns:repeat(3,110px);
      gap:12px;
      margin-top:10px;
    }

    .cell{
      width:110px;
      height:110px;
      background:#0f172a;
      border-radius:20px;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:55px;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 0 15px rgba(37,99,235,0.4);
    }

    .cell:hover{
      background:#1e293b;
      transform:scale(1.05);
    }

    .bottom{
      margin-top:25px;
      display:flex;
      gap:15px;
      width:100%;
      max-width:400px;
    }

    .chat{
      margin-top:30px;
      width:100%;
      max-width:400px;
    }

    .chat-box{
      height:150px;
      overflow-y:auto;
      background:#0f172a;
      padding:10px;
      border-radius:15px;
      margin-bottom:10px;
    }

    .chat input{
      width:100%;
      margin-bottom:10px;
    }

    .scoreboard{
      margin-top:20px;
      font-size:22px;
    }

    @media(max-width:500px){
      h1{
        font-size:40px;
      }

      .board{
        grid-template-columns:repeat(3,90px);
      }

      .cell{
        width:90px;
        height:90px;
        font-size:45px;
      }
    }
  </style>
</head>

<body>

  <h1>Tic Tac Toe Online</h1>

  <div class="controls">
    <input type="text" id="roomInput" placeholder="Enter Room ID">

    <div class="btns">
      <button onclick="createRoom()">Create Room</button>
      <button onclick="joinRoom()">Join Room</button>
    </div>
  </div>

  <div id="status">Waiting...</div>

  <div class="scoreboard">
    X Wins: <span id="xWins">0</span> |
    O Wins: <span id="oWins">0</span>
  </div>

  <div class="board" id="board"></div>

  <div class="bottom">
    <button onclick="restartGame()">Restart Game</button>
  </div>

  <div class="chat">
    <div class="chat-box" id="chatBox"></div>

    <input type="text" id="chatInput" placeholder="Type message...">

    <button onclick="sendMessage()">Send Message</button>
  </div>

  <audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

  <audio id="winSound" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

  <script type="module">

    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';

    import {
      getDatabase,
      ref,
      set,
      update,
      onValue,
      push
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

    const firebaseConfig = {
      apiKey: "AIzaSyD_Wjg3QjRaeOJ3kJOvFubbMEGC9WTrVFw",
      authDomain: "tic-tac-toe-online-6260f.firebaseapp.com",
      databaseURL: "https://tic-tac-toe-online-6260f-default-rtdb.firebaseio.com/",
      projectId: "tic-tac-toe-online-6260f",
      storageBucket: "tic-tac-toe-online-6260f.firebasestorage.app",
      messagingSenderId: "620850857572",
      appId: "1:620850857572:web:d971bfec3d4e59720e0171",
      measurementId: "G-J165BR8RH3"
    };

    const app = initializeApp(firebaseConfig);

    const db = getDatabase(app);

    const boardEl = document.getElementById("board");
    const statusEl = document.getElementById("status");

    let roomId = "";
    let mySymbol = "";
    let currentPlayer = "X";

    let board = ["","","","","","","","",""];

    let xWins = 0;
    let oWins = 0;

    function renderBoard(){

      boardEl.innerHTML = "";

      board.forEach((cell,index)=>{

        const div = document.createElement("div");

        div.className = "cell";

        div.innerText = cell;

        div.onclick = ()=>makeMove(index);

        boardEl.appendChild(div);

      });

    }

    renderBoard();

    window.createRoom = function(){

      roomId = document.getElementById("roomInput").value;

      if(!roomId){
        alert("Enter Room ID");
        return;
      }

      mySymbol = "X";

      set(ref(db,"rooms/" + roomId),{
        board:["","","","","","","","",""],
        currentPlayer:"X",
        winner:"",
        xWins:0,
        oWins:0
      });

      listenRoom();

      listenChat();

      statusEl.innerText = "Room Created";

    }

    window.joinRoom = function(){

      roomId = document.getElementById("roomInput").value;

      if(!roomId){
        alert("Enter Room ID");
        return;
      }

      mySymbol = "O";

      listenRoom();

      listenChat();

      statusEl.innerText = "Joined Room";

    }

    function listenRoom(){

      onValue(ref(db,"rooms/" + roomId),(snapshot)=>{

        const data = snapshot.val();

        if(!data) return;

        board = data.board;

        currentPlayer = data.currentPlayer;

        renderBoard();

        document.getElementById("xWins").innerText = data.xWins || 0;

        document.getElementById("oWins").innerText = data.oWins || 0;

        if(data.winner){

          statusEl.innerText = data.winner + " Wins!";

          document.getElementById("winSound").play();

        }else{

          statusEl.innerText = "Turn: " + currentPlayer;

        }

      });

    }

    function makeMove(index){

      if(board[index] !== "") return;

      if(currentPlayer !== mySymbol) return;

      board[index] = mySymbol;

      document.getElementById("clickSound").play();

      const winner = checkWinner();

      let newXWins = xWins;
      let newOWins = oWins;

      if(winner === "X"){
        newXWins++;
      }

      if(winner === "O"){
        newOWins++;
      }

      update(ref(db,"rooms/" + roomId),{
        board:board,
        currentPlayer:currentPlayer === "X" ? "O" : "X",
        winner:winner,
        xWins:newXWins,
        oWins:newOWins
      });

    }

    function checkWinner(){

      const wins = [
        [0,1,2],
        [3,4,5],
        [6,7,8],
        [0,3,6],
        [1,4,7],
        [2,5,8],
        [0,4,8],
        [2,4,6]
      ];

      for(let combo of wins){

        const [a,b,c] = combo;

        if(board[a] &&
          board[a] === board[b] &&
          board[a] === board[c]){

          return board[a];

        }

      }

      return "";

    }

    window.restartGame = function(){

      update(ref(db,"rooms/" + roomId),{
        board:["","","","","","","","",""],
        currentPlayer:"X",
        winner:""
      });

    }

    window.sendMessage = function(){

      const input = document.getElementById("chatInput");

      if(input.value.trim() === "") return;

      push(ref(db,"chats/" + roomId),{
        sender:mySymbol,
        text:input.value
      });

      input.value = "";

    }

    function listenChat(){

      onValue(ref(db,"chats/" + roomId),(snapshot)=>{

        const data = snapshot.val();

        const chatBox = document.getElementById("chatBox");

        chatBox.innerHTML = "";

        if(data){

          Object.values(data).forEach(msg=>{

            const p = document.createElement("p");

            p.innerHTML = "<b>" + msg.sender + ":</b> " + msg.text;

            chatBox.appendChild(p);

          });

        }

      });

    }

  </script>

</body>
</html>
